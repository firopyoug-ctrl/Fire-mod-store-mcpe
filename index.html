<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Fire Mod Store · User</title>
    <!-- Font Awesome for icons (clean, minimal) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
        }
        body {
            background: #1a1e2a;
            color: #f0f2f5;
            padding-bottom: 2rem;
        }
        /* header */
        .app-header {
            background: #2a2f3f;
            padding: 1.2rem 1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #ff8c3e;
        }
        .app-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 2px 2px 0 #3a2e28;
        }
        .app-header h1 i {
            color: #ffb347;
            margin-right: 6px;
        }
        .minecraft-badge {
            background: #3b3f4f;
            padding: 0.4rem 0.9rem;
            border-radius: 30px;
            font-size: 0.9rem;
            border: 1px solid #5f5f6f;
            color: #ddd;
        }
        /* image slider (hero) */
        .slider-container {
            position: relative;
            width: 100%;
            overflow: hidden;
            border-radius: 0 0 20px 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            margin-bottom: 2rem;
        }
        .slider-wrapper {
            display: flex;
            transition: transform 0.4s ease-in-out;
        }
        .slider-slide {
            min-width: 100%;
            height: 200px;
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .slider-slide::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40%;
            background: linear-gradient(to top, #1a1e2a, transparent);
        }
        .slider-caption {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            font-size: 1.6rem;
            font-weight: bold;
            text-shadow: 3px 3px 0 #00000080;
            z-index: 2;
        }
        .slider-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 5;
            backdrop-filter: blur(4px);
            border: 1px solid #ffffff40;
        }
        .slider-btn.left { left: 10px; }
        .slider-btn.right { right: 10px; }
        .slider-dots {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 8px;
            margin-bottom: 10px;
        }
        .dot {
            width: 12px;
            height: 12px;
            background: #4f5464;
            border-radius: 20px;
            transition: 0.2s;
            cursor: pointer;
        }
        .dot.active {
            background: #ffa75e;
            width: 28px;
        }
        /* mods grid */
        .section-title {
            font-size: 1.8rem;
            margin: 1.2rem 1rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            border-left: 6px solid #ff9933;
            padding-left: 1rem;
        }
        .cards-grid {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            padding: 0 1rem 2rem;
        }
        /* card item */
        .mod-card {
            background: #252a36;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 20px #00000040;
            display: flex;
            flex-direction: row;
            align-items: center;
            transition: all 0.2s ease;
            border: 1px solid #3d4355;
            cursor: pointer;
        }
        .mod-card:hover {
            transform: scale(1.01);
            background: #2e3442;
            border-color: #ffa75e;
        }
        .mod-card-img {
            width: 110px;
            height: 110px;
            object-fit: cover;
            background: #3d3f4b;
            border-right: 2px solid #ff9933;
        }
        .mod-card-content {
            flex: 1;
            padding: 0.8rem 1rem;
        }
        .mod-card-content h3 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .mod-desc-short {
            color: #b9c2d0;
            font-size: 0.9rem;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .download-btn {
            background: #ff8c3e;
            border: none;
            color: black;
            font-weight: bold;
            padding: 0.5rem 1.3rem;
            border-radius: 40px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 0 #b34e0e;
            transition: 0.1s linear;
            cursor: pointer;
            border: 1px solid #ffb77c;
        }
        .download-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #b34e0e;
        }
        .download-btn i {
            font-size: 1rem;
        }
        .arrow-icon {
            color: #ffcc99;
            font-size: 1.2rem;
        }
        /* detail modal / panel */
        .detail-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10, 12, 18, 0.95);
            backdrop-filter: blur(8px);
            z-index: 200;
            display: none;
            flex-direction: column;
            padding: 1.5rem 1rem;
            overflow-y: auto;
        }
        .detail-content {
            max-width: 500px;
            margin: 2rem auto;
            background: #202532;
            border-radius: 40px 40px 30px 30px;
            padding: 1.5rem 1rem 2rem;
            border: 1px solid #ff9933;
        }
        .close-detail {
            font-size: 2.2rem;
            background: none;
            border: none;
            color: #ccc;
            float: right;
            margin-top: -0.5rem;
            cursor: pointer;
        }
        .detail-slider {
            width: 100%;
            height: 220px;
            border-radius: 30px;
            background: #2e3440;
            margin: 1rem 0;
            position: relative;
            overflow: hidden;
        }
        .detail-slider-wrapper {
            display: flex;
            height: 100%;
            transition: transform 0.3s ease;
        }
        .detail-slide {
            min-width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
        }
        .detail-title {
            font-size: 2rem;
            margin: 0.5rem 0 0.2rem;
        }
        .detail-full-desc {
            color: #cbd5e0;
            margin: 1rem 0;
            line-height: 1.5;
        }
        .detail-download-link {
            display: inline-block;
            background: #ff8c3e;
            color: #000;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.3rem;
            text-decoration: none;
            margin: 1rem 0 0.5rem;
            border: 2px solid #ffb86b;
        }
        .detail-nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 0.8rem 0;
        }
        .detail-nav button {
            background: #3a4052;
            border: none;
            color: white;
            font-size: 1.4rem;
            width: 50px;
            height: 50px;
            border-radius: 40px;
            cursor: pointer;
        }
        /* admin callout */
        .admin-link {
            text-align: center;
            margin: 1rem;
        }
        .admin-link a {
            color: #aab3cc;
            text-decoration: none;
            border: 1px solid #5f6b7a;
            padding: 0.5rem 2rem;
            border-radius: 40px;
            font-size: 0.9rem;
        }
        i { pointer-events: none; }
    </style>
</head>
<body>
    <header class="app-header">
        <h1><i class="fas fa-cube"></i> Fire Mod Store</h1>
        <span class="minecraft-badge"><i class="fas fa-gamepad"></i> MC</span>
    </header>

    <!-- Image slider (dynamic) -->
    <div class="slider-container" id="sliderContainer">
        <div class="slider-wrapper" id="sliderWrapper">
            <!-- slides injected via JS -->
        </div>
        <button class="slider-btn left" id="slidePrev"><i class="fas fa-chevron-left"></i></button>
        <button class="slider-btn right" id="slideNext"><i class="fas fa-chevron-right"></i></button>
    </div>
    <div class="slider-dots" id="sliderDots"></div>

    <!-- Mods grid -->
    <div class="section-title">
        <i class="fas fa-dragon" style="color:#ffa75e;"></i> All Mods
    </div>
    <div class="cards-grid" id="modsListContainer">
        <!-- mod cards appear here -->
    </div>

    <!-- detail panel (hidden by default) -->
    <div class="detail-overlay" id="detailPanel">
        <div class="detail-content">
            <button class="close-detail" id="closeDetailBtn"><i class="fas fa-times"></i></button>
            <div class="detail-slider" id="detailSlider">
                <div class="detail-slider-wrapper" id="detailSliderWrapper"></div>
                <div class="detail-nav">
                    <button id="detailPrev"><i class="fas fa-chevron-left"></i></button>
                    <button id="detailNext"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
            <h2 class="detail-title" id="detailTitle">Mod name</h2>
            <p class="detail-full-desc" id="detailDesc">Full description goes here...</p>
            <a href="#" id="detailDownloadLink" class="detail-download-link" target="_blank"><i class="fas fa-download"></i> Download</a>
        </div>
    </div>

    <div class="admin-link">
        <a href="admin.html"><i class="fas fa-lock"></i> Admin panel</a>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        (function() {
            // ==================== FIREBASE CONFIG (REPLACE WITH YOUR CREDENTIALS) ====================
            const firebaseConfig = {
  apiKey: "AIzaSyAoOlNRTaBk_hzr-26LHY8hWIaesH6SS0o",
  authDomain: "re-mod-store.firebaseapp.com",
  databaseURL: "https://re-mod-store-default-rtdb.firebaseio.com",
  projectId: "re-mod-store",
  storageBucket: "re-mod-store.firebasestorage.app",
  messagingSenderId: "298999489012",
  appId: "1:298999489012:web:5cc1284eb374b1f57319a1",
  measurementId: "G-DN0QYN322J"
            };
            // Initialize Firebase
            firebase.initializeApp(firebaseConfig);
            const db = firebase.database();
            // ==========================================================================================

            // references
            const sliderWrapper = document.getElementById('sliderWrapper');
            const sliderDots = document.getElementById('sliderDots');
            const modsContainer = document.getElementById('modsListContainer');
            const slidePrev = document.getElementById('slidePrev');
            const slideNext = document.getElementById('slideNext');

            // detail elements
            const detailPanel = document.getElementById('detailPanel');
            const detailTitle = document.getElementById('detailTitle');
            const detailDesc = document.getElementById('detailDesc');
            const detailDownloadLink = document.getElementById('detailDownloadLink');
            const detailSliderWrapper = document.getElementById('detailSliderWrapper');
            const closeDetailBtn = document.getElementById('closeDetailBtn');
            const detailPrev = document.getElementById('detailPrev');
            const detailNext = document.getElementById('detailNext');

            // state
            let sliderImages = [];          // array of {imageUrl, caption?}
            let currentSlide = 0;
            let autoSlideInterval;

            let mods = [];                  // all mods
            let currentMod = null;           // for detail view
            let currentDetailImageIndex = 0;

            // ---------- fetch from firebase (realtime) ----------
            const sliderRef = db.ref('sliderImages');
            const modsRef = db.ref('mods');

            // slider listener
            sliderRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    sliderImages = Object.keys(data).map(key => ({ id: key, ...data[key] }));
                } else {
                    sliderImages = [];
                }
                renderSlider();
                resetAutoSlide();
            });

            // mods listener
            modsRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    mods = Object.keys(data).map(key => ({ id: key, ...data[key] }));
                } else {
                    mods = [];
                }
                renderMods();
            });

            // ---------- render functions ----------
            function renderSlider() {
                if (!sliderImages.length) {
                    // placeholder slides if empty
                    sliderWrapper.innerHTML = `<div class="slider-slide" style="background-image: url('https://via.placeholder.com/600x300/2a2f3f/ff9933?text=Fire+Mods')"><div class="slider-caption">Add slider in admin</div></div>`;
                    sliderDots.innerHTML = '<span class="dot active"></span>';
                    return;
                }
                let slidesHtml = '';
                sliderImages.forEach((img, idx) => {
                    slidesHtml += `<div class="slider-slide" style="background-image: url('${img.imageUrl || 'https://via.placeholder.com/400x200'}');"><div class="slider-caption">${img.caption || 'Minecraft Mod'}</div></div>`;
                });
                sliderWrapper.innerHTML = slidesHtml;
                // dots
                let dotsHtml = '';
                sliderImages.forEach((_, i) => {
                    dotsHtml += `<span class="dot ${i === currentSlide ? 'active' : ''}" data-index="${i}"></span>`;
                });
                sliderDots.innerHTML = dotsHtml;
                updateSlidePosition();

                // attach dot click
                document.querySelectorAll('.dot').forEach(dot => {
                    dot.addEventListener('click', (e) => {
                        const idx = e.target.getAttribute('data-index');
                        if (idx !== null) {
                            currentSlide = parseInt(idx);
                            updateSlidePosition();
                            resetAutoSlide();
                        }
                    });
                });
            }

            function updateSlidePosition() {
                if (!sliderWrapper) return;
                const width = sliderWrapper.clientWidth;
                sliderWrapper.style.transform = `translateX(-${currentSlide * width}px)`;
                document.querySelectorAll('.dot').forEach((dot, i) => {
                    if (i === currentSlide) dot.classList.add('active');
                    else dot.classList.remove('active');
                });
            }

            window.addEventListener('resize', () => {
                updateSlidePosition();
                if (currentMod) alignDetailSlider();
            });

            // slider navigation
            slidePrev.addEventListener('click', () => {
                if (sliderImages.length === 0) return;
                currentSlide = (currentSlide - 1 + sliderImages.length) % sliderImages.length;
                updateSlidePosition();
                resetAutoSlide();
            });
            slideNext.addEventListener('click', () => {
                if (sliderImages.length === 0) return;
                currentSlide = (currentSlide + 1) % sliderImages.length;
                updateSlidePosition();
                resetAutoSlide();
            });

            function resetAutoSlide() {
                if (autoSlideInterval) clearInterval(autoSlideInterval);
                if (sliderImages.length > 1) {
                    autoSlideInterval = setInterval(() => {
                        currentSlide = (currentSlide + 1) % sliderImages.length;
                        updateSlidePosition();
                    }, 5000);
                }
            }

            // render mod cards
            function renderMods() {
                if (!mods.length) {
                    modsContainer.innerHTML = `<div style="text-align:center; padding:2rem; color:#aaa;"><i class="fas fa-box-open fa-2x"></i><p>No mods yet. Add from telegram </tfoot>.</p></div>`;
                    return;
                }
                let html = '';
                mods.forEach(mod => {
                    html += `
                        <div class="mod-card" data-mod-id="${mod.id}">
                            <img class="mod-card-img" src="${mod.imageUrl || 'https://via.placeholder.com/120'}" alt="${mod.name}" loading="lazy">
                            <div class="mod-card-content">
                                <h3>${mod.name || 'Unnamed'}</h3>
                                <div class="mod-desc-short">${mod.shortDesc || mod.description?.substring(0,60) || '...'}</div>
                                <div class="card-footer">
                                    <button class="download-btn" data-mod-id="${mod.id}" data-download="${mod.downloadLink || '#'}"><i class="fas fa-download"></i> Get</button>
                                    <i class="fas fa-chevron-right arrow-icon"></i>
                                </div>
                            </div>
                        </div>
                    `;
                });
                modsContainer.innerHTML = html;

                // attach click listeners: card -> open detail, download button direct download
                document.querySelectorAll('.mod-card').forEach(card => {
                    card.addEventListener('click', (e) => {
                        const target = e.target.closest('.download-btn');
                        if (target) {
                            e.stopPropagation();
                            const link = target.getAttribute('data-download');
                            if (link && link !== '#') window.open(link, '_blank');
                            else alert('No download link set');
                            return;
                        }
                        const modId = card.dataset.modId;
                        const mod = mods.find(m => m.id === modId);
                        if (mod) openDetail(mod);
                    });
                });
            }

            // open detail panel
            function openDetail(mod) {
                currentMod = mod;
                currentDetailImageIndex = 0;
                detailTitle.innerText = mod.name || 'Mod';
                detailDesc.innerText = mod.description || mod.fullDescription || 'No description provided.';
                detailDownloadLink.href = mod.downloadLink || '#';
                // slider images
                let images = [];
                if (mod.sliderImages && Array.isArray(mod.sliderImages)) {
                    images = mod.sliderImages;
                } else if (mod.imageUrl) {
                    images = [mod.imageUrl];
                } else {
                    images = ['https://via.placeholder.com/600x300/445/fff?text=No+Image'];
                }
                let slides = '';
                images.forEach(url => {
                    slides += `<div class="detail-slide" style="background-image: url('${url}');"></div>`;
                });
                detailSliderWrapper.innerHTML = slides;
                alignDetailSlider();
                detailPanel.style.display = 'flex';
            }

            function alignDetailSlider() {
                if (!currentMod) return;
                const wrapper = detailSliderWrapper;
                if (wrapper) {
                    const slideWidth = wrapper.parentElement?.clientWidth || 300;
                    wrapper.style.transform = `translateX(-${currentDetailImageIndex * slideWidth}px)`;
                }
            }

            // detail navigation
            detailPrev.addEventListener('click', () => {
                if (!currentMod) return;
                const slides = detailSliderWrapper.children.length;
                if (slides === 0) return;
                currentDetailImageIndex = (currentDetailImageIndex - 1 + slides) % slides;
                alignDetailSlider();
            });
            detailNext.addEventListener('click', () => {
                if (!currentMod) return;
                const slides = detailSliderWrapper.children.length;
                if (slides === 0) return;
                currentDetailImageIndex = (currentDetailImageIndex + 1) % slides;
                alignDetailSlider();
            });

            closeDetailBtn.addEventListener('click', () => {
                detailPanel.style.display = 'none';
                currentMod = null;
            });
            detailPanel.addEventListener('click', (e) => {
                if (e.target === detailPanel) detailPanel.style.display = 'none';
            });

            // initial slide alignment after images load
            window.addEventListener('load', () => {
                updateSlidePosition();
                resetAutoSlide();
            });

            // instruction reminder
            console.log('🔥 Fire Mod Store: replace firebase config with your own to store data.');
        })();
    </script>
    <!-- additional comment: teeegm chanel is separate file (https://t.me/fireplyz) that writes to same db -->
    <!-- user.html ready -->
</body>
</html>
